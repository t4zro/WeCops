workflows:
  android-apk:
    name: Android APK Build

    instance_type: linux_x2

    environment:
      flutter: stable
      java: 17

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Verify Flutter
        script: |
          flutter doctor -v

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - vimal.bussinessig@gmail.com
