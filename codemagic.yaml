workflows:
  default:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: 3.22.0
    scripts:
      - name: Clean everything
        script: |
          rm -rf android
          rm -rf build
          rm -rf .gradle
          flutter clean
      - name: Create Android folder with latest template
        script: |
          flutter create --platforms=android .
      - name: Update Gradle files for Flutter 3.22
        script: |
          # Update settings.gradle
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }
              settings.ext.flutterSdkPath = flutterSdkPath()
              includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "7.3.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          EOF

          # Update app/build.gradle
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.us.app.us_app"
              compileSdkVersion 36
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = '1.8'
              }
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
              defaultConfig {
                  applicationId "com.us.app.us_app"
                  minSdkVersion 21
                  targetSdkVersion 36
                  versionCode 1
                  versionName "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          EOF

          # Update project build.gradle
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.google.gms:google-services:4.3.15'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # Create local.properties
          cat > android/local.properties << 'EOF'
          sdk.dir=/usr/local/share/android-sdk
          flutter.sdk=/Users/builder/programs/flutter
          EOF
      - name: Build APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/apk/debug/*.apk
