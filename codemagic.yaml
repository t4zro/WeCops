workflows:
  default:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Clean everything
        script: |
          rm -rf android
          rm -rf build
          rm -rf .gradle
          flutter clean
      - name: Create Android folder
        script: |
          flutter create --platforms=android .
      - name: Remove conflicting files
        script: |
          rm -f android/build.gradle.kts
          rm -f android/app/build.gradle.kts
      - name: Force update build.gradle
        script: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.us.app.us_app"
              compileSdkVersion 36
              defaultConfig {
                  applicationId "com.us.app.us_app"
                  minSdkVersion 21
                  targetSdkVersion 36
                  versionCode 1
                  versionName "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
              flutter {
                  source './.'
              }
          }
          apply plugin: 'com.google.gms.google-services'
          EOF
      - name: Update project build.gradle
        script: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.3.15'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
      - name: Build APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/apk/debug/*.apk
