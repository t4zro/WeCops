workflows:
  default:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Clean everything
        script: |
          rm -rf android
          rm -rf build
          rm -rf .gradle
          flutter clean
      - name: Create Android folder
        script: |
          flutter create --platforms=android .
      - name: Force update SDK versions
        script: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.us.app.us_app"
              compileSdkVersion 36
              defaultConfig {
                  applicationId "com.us.app.us_app"
                  minSdkVersion 21
                  targetSdkVersion 36
                  versionCode 1
                  versionName "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
              flutter {
                  source './.'
              }
          }
          apply plugin: 'com.google.gms.google-services'
          EOF
      - name: Build APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/apk/debug/*.apk
