workflows:
  default:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Fix Android embedding
        script: |
          rm -rf android
          flutter create --platforms=android .
      - name: Build APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/apk/debug/*.apk
