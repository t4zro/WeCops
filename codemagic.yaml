workflows:
  default:
    name: Flutter Android Build
    instance_type: mac_mini_m2

    environment:
      flutter: 3.22.0

    scripts:
      - name: Clean project
        script: |
          flutter clean
          rm -rf build
          flutter pub get

      - name: Recreate Android project
        script: |
          rm -rf android
          flutter create --platforms=android .

      - name: Build Debug APK
        script: |
          flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
