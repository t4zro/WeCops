plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.us.app.us_app"

    defaultConfig {
        applicationId "com.us.app.us_app"

        minSdkVersion 24
        targetSdkVersion 35
        compileSdkVersion 35
    }
}
    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}
flutter {
    source '../..'
}
apply plugin: 'com.google.gms.google-services'
