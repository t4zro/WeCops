plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.usapp.us_app"
    compileSdkVersion 34
    defaultConfig {
        applicationId "com.usapp.us_app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
        multiDexEnabled true
    }
    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}
flutter {
    source '../..'
}
apply plugin: 'com.google.gms.google-services'
